  <h1 class="article-title">Cresight Japanを設立しました</h1>
  <div class="article-body">
    <p>2026年2月9日、Cresight Japanを設立いたしました。</p>
    <p>「世界のイノベーションを日本へ、日本の魅力を世界へ」という理念のもと、海外企業の日本進出支援、日本企業の海外展開支援、TikTok Shopサポートの3つの事業を展開してまいります。</p>
    <p>国境を越えたビジネスの成長を支える架け橋として、皆さまのお役に立てるよう尽力いたします。今後ともどうぞよろしくお願いいたします。</p>
